<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Backyard DnD</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <div class="main-container">
        <div class="main-content">
            <section class="log-in section" id="login">
                <div class="container">
                    <div class="login-form">
                        <form action="" id="form">
                            <div class="row">
                                <div class="form-item col-12 padd-15">
                                    <div class="form-group">
                                        <h2>Username:</h2>
                                        <label for="user_name"></label><input type="text" class="form-control" placeholder="Username" name="user_name" id="user_name">
                                    </div>
                                </div>
                                <div class="form-item col-12 padd-15">
                                    <div class="form-group">
                                        <h2>Password:</h2>
                                        <label for="password"></label><input type="text" class="form-control" placeholder="Password" name="password" id="password">
                                    </div>
                                </div>
                                <div class="form-item col-12 padd-15">
                                    <div class="form-group">
                                        <a href="home.html" class="btn log-in"><span>Login</span></a>
                                    </div>
                                </div>
                                <div class="form-item col-12 padd-15">
                                    <div class="form-group">
                                        <a class="hLink" href="#">Forgot Password</a>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </section>
        </div>
    </div>
</body>
</html>
